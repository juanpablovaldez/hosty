name: Deploy Frontend to DEV

on:
  push:
    branches:
      - dev # 👈 CAMBIO: Solo se ejecuta al pushear a la rama dev
    # Buena práctica: Solo ejecutamos este pipeline si hay cambios en la carpeta del frontend
    paths:
      - "frontend/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        working-directory: ./frontend
        run: npm ci

      - name: Construir la aplicación (Build)
        working-directory: ./frontend
        run: npm run build

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Desplegar a S3
        working-directory: ./frontend
        # 👈 CAMBIO: Usamos la variable de entorno que configuraste en GitHub
        run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET_NAME_DEV }} --delete
