name: Deploy Backend to DEV

on:
  push:
    branches: [dev]
    paths:
      - "backend/**"
      - "package.json"
      - "package-lock.json"

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Get runner public IP
        id: ip
        run: echo "ip=$(curl -s https://checkip.amazonaws.com)/32" >> $GITHUB_OUTPUT

      - name: Allow runner IP in security group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID_DEV }} \
            --protocol tcp --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install, generate, and build
        working-directory: backend
        env:
          HUSKY: "0"
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Apply database migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
        run: npx prisma migrate deploy

      - name: Prune to production dependencies
        working-directory: backend
        env:
          HUSKY: "0"
        run: npm ci --omit=dev

      - name: Copy build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_DEV }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY_DEV }}
          source: "backend/dist,backend/node_modules,backend/generated,backend/prisma,backend/package.json"
          target: ~/hosty
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST_DEV }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY_DEV }}
          envs: DATABASE_URL,FRONTEND_URL
          script: |
            set -e
            export PATH=$PATH:/usr/bin:/usr/local/bin

            # Bootstrap: install Node.js 22 if not present or wrong version
            if ! node --version 2>/dev/null | grep -q "^v22"; then
              sudo apt-get -o DPkg::Lock::Timeout=120 update
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo bash -
              sudo apt-get -o DPkg::Lock::Timeout=120 install -y nodejs
            fi

            # Bootstrap: install pm2 if not present
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
              sudo env PATH=$PATH $(which pm2) startup systemd -u ubuntu --hp /home/ubuntu || true
              sudo systemctl enable pm2-ubuntu || true
            fi

            mkdir -p ~/hosty/backend

            # Write .env file from GitHub secrets
            cat > ~/hosty/backend/.env <<EOF
            DATABASE_URL="${DATABASE_URL}"
            NODE_ENV="production"
            PORT=3000
            FRONTEND_URL="${FRONTEND_URL}"
            AWS_REGION="us-east-1"
            EOF

            cd ~/hosty
            # Start or restart the service
            pm2 restart backend --update-env \
              || pm2 start "node backend/dist/src/main.js" --name backend
            pm2 save
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL_DEV }}

      - name: Remove runner IP from security group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SG_ID_DEV }} \
            --protocol tcp --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
