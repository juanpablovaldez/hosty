<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hosty — Panel del Host</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ───────── HOSTY — Tokens (Brandbook Abril 2026) ───────── */
:root{
  --coral:#E8452A; --coral-dark:#C93820; --coral-light:#FF6B50;
  --ink:#1C2B3A; --ink-light:#2D4259;
  --bone:#FAF8F5; --bone-dark:#F0EDE8;
  --arena:#EBE3D5;
  --amber:#F5A623; --amber-light:#FEF3DC; --amber-dark:#B87A10;
  --green:#1D6B47; --green-light:#E3F0E9;
  --red-soft:#FCE9E5; --red-text:#B33820;

  --bg:var(--bone); --fg:var(--ink);
  --card:#FFFFFF; --card-fg:var(--ink);
  --muted:#F0EDE8; --muted-fg:#5C6B7A;
  --border:#D6DCE2;
  --surface-warm:var(--arena);
  --shadow-sm:0 1px 3px rgba(28,43,58,.05),0 5px 14px rgba(28,43,58,.07);
  --shadow-md:0 2px 4px rgba(28,43,58,.04),0 10px 30px rgba(28,43,58,.09);
  --shadow-lg:0 4px 8px rgba(28,43,58,.04),0 20px 56px rgba(28,43,58,.12),0 48px 88px rgba(28,43,58,.05);
}
[data-theme="dark"]{
  --bg:#1C2B3A; --fg:#FAF8F5;
  --card:#25323F; --card-fg:#FAF8F5;
  --muted:#2A3845; --muted-fg:#9AA8B5;
  --border:#344454;
  --surface-warm:#2A3845;
  --amber-light:rgba(245,166,35,.14); --amber-dark:#F5C168;
  --green-light:rgba(29,107,71,.22);
  --red-soft:rgba(232,69,42,.16); --red-text:#FF8A73;
  --shadow-sm:0 1px 3px rgba(0,0,0,.2),0 5px 14px rgba(0,0,0,.22);
  --shadow-md:0 2px 4px rgba(0,0,0,.18),0 10px 30px rgba(0,0,0,.3);
  --shadow-lg:0 4px 8px rgba(0,0,0,.2),0 20px 56px rgba(0,0,0,.4);
}
[data-theme="dark"] .green-pill{ color:#6ECB9B; }

*{box-sizing:border-box;border-color:var(--border);}
html{scroll-behavior:smooth;}
body{
  margin:0; background:var(--bg); color:var(--fg);
  font-family:'Plus Jakarta Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
  transition:background .25s,color .25s;
}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
svg.lucide{flex-shrink:0;}

/* ───────── Header global ───────── */
.hdr{position:sticky;top:0;z-index:100;background:color-mix(in srgb,var(--bg) 94%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.hdr::before{content:"";position:absolute;top:0;left:0;right:0;height:2.5px;background:var(--coral);}
.hdr-in{max-width:1280px;margin:0 auto;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;}
.logo{display:flex;align-items:center;gap:10px;color:var(--coral);text-decoration:none;}
.logo span{font-weight:800;font-size:20px;letter-spacing:-.02em;}
.hdr-nav{display:flex;gap:34px;}
.hdr-nav a{font-size:14px;font-weight:600;color:var(--muted-fg);text-decoration:none;position:relative;padding-bottom:2px;transition:color .18s;}
.hdr-nav a::after{content:"";position:absolute;bottom:-2px;left:0;right:0;height:1.5px;background:var(--coral);transform:scaleX(0);transform-origin:left;transition:transform .22s;}
.hdr-nav a:hover{color:var(--fg);} .hdr-nav a:hover::after{transform:scaleX(1);}
.hdr-nav a.active{color:var(--fg);} .hdr-nav a.active::after{transform:scaleX(1);}
.hdr-actions{display:flex;align-items:center;gap:10px;}
.icon-btn{display:grid;place-items:center;width:38px;height:38px;border:none;background:transparent;border-radius:8px;color:var(--fg);transition:background .18s;}
.icon-btn:hover{background:var(--muted);}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--ink-light);color:#FAF8F5;display:grid;place-items:center;font-weight:700;font-size:14px;}
[data-theme="dark"] .avatar{background:var(--coral);}

/* ───────── Layout ───────── */
.wrap{max-width:1080px;margin:0 auto;padding:40px 24px 90px;}
.subnav{display:flex;gap:6px;margin-bottom:36px;border-bottom:1px solid var(--border);overflow-x:auto;}
.subnav button{background:none;border:none;padding:10px 16px 13px;font-size:14.5px;font-weight:600;color:var(--muted-fg);position:relative;white-space:nowrap;transition:color .18s;}
.subnav button:hover{color:var(--fg);}
.subnav button.on{color:var(--fg);}
.subnav button.on::after{content:"";position:absolute;bottom:-1px;left:14px;right:14px;height:2.5px;border-radius:2px;background:var(--coral);}
.subnav .cnt{margin-left:7px;font-size:11px;font-weight:700;background:var(--coral);color:#fff;border-radius:99px;padding:2px 7px;vertical-align:1px;}

.page-title{font-size:33px;font-weight:800;letter-spacing:-.03em;margin:0 0 6px;line-height:1.15;}
.page-title .dot{color:var(--coral);}
.page-title .serif{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;letter-spacing:0;}
.page-sub{color:var(--muted-fg);font-size:15px;margin:0;}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:34px;flex-wrap:wrap;}

/* ───────── Botones ───────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:8px;font-weight:600;font-size:14px;padding:10px 18px;border:1px solid transparent;transition:all .18s;text-decoration:none;}
.btn-primary{background:var(--coral);color:#fff;box-shadow:0 2px 10px rgba(232,69,42,.28);}
.btn-primary:hover{background:var(--coral-dark);}
.btn-outline{background:transparent;border-color:var(--border);color:var(--fg);}
.btn-outline:hover{background:var(--muted);}
.btn-danger{background:transparent;border-color:color-mix(in srgb,var(--red-text) 38%,transparent);color:var(--red-text);}
.btn-danger:hover{background:var(--red-soft);}
.btn-ghost{background:transparent;color:var(--muted-fg);}
.btn-ghost:hover{background:var(--muted);color:var(--fg);}
.btn-sm{padding:8px 14px;font-size:13px;}
.btn:active{transform:translateY(1px);}

/* ───────── Cards ───────── */
.card{background:var(--card);color:var(--card-fg);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-sm);transition:box-shadow .22s,transform .22s;}
.card.hoverable:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:44px;}
.stat{padding:20px 22px;display:flex;flex-direction:column;gap:10px;position:relative;}
.stat .lbl{font-size:12.5px;font-weight:600;color:var(--muted-fg);display:flex;align-items:center;gap:7px;text-transform:uppercase;letter-spacing:.04em;}
.stat .num{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1;}
.stat .sub{font-size:12.5px;color:var(--muted-fg);}
.stat .ico{position:absolute;top:18px;right:18px;color:var(--muted-fg);opacity:.55;}

/* Pills de estado */
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:99px;font-size:11px;font-weight:600;padding:4px 11px;letter-spacing:.02em;white-space:nowrap;}
.pill-pendiente{background:var(--amber-light);color:var(--amber-dark);}
.pill-confirmada{background:var(--green-light);color:var(--green);}
.pill-rechazada{background:var(--red-soft);color:var(--red-text);}
.pill-cancelada{background:var(--muted);color:var(--muted-fg);}
.pill-coral{background:var(--coral);color:#fff;font-weight:700;}
[data-theme="dark"] .pill-confirmada{color:#6ECB9B;}

/* HostyBadge de marca */
.hbadge{position:relative;display:inline-flex;align-items:center;gap:6px;padding:5px 11px 5px 7px;border-radius:6px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;line-height:1;box-shadow:0 1px 5px rgba(28,43,58,.16);}
.hbadge::before{content:"";position:absolute;inset:2px;border-radius:4px;border:1px solid;pointer-events:none;}
.hbadge .sep{width:1px;height:11px;flex-shrink:0;}
.hbadge-verificado{background:#1D6B47;color:#fff;}
.hbadge-verificado::before{border-color:rgba(255,255,255,.18);} .hbadge-verificado .sep{background:rgba(255,255,255,.26);}
.hbadge-mejor{background:#F5A623;color:#1C2B3A;}
.hbadge-mejor::before{border-color:rgba(28,43,58,.10);} .hbadge-mejor .sep{background:rgba(28,43,58,.14);}

/* ───────── Secciones ───────── */
.sec{margin-bottom:44px;}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;}
.sec-title{font-size:19px;font-weight:700;letter-spacing:-.015em;margin:0;display:flex;align-items:center;gap:10px;}
.sec-link{font-size:13.5px;font-weight:600;color:var(--coral);background:none;border:none;display:inline-flex;align-items:center;gap:3px;}
.sec-link:hover{color:var(--coral-dark);}

/* ───────── Card de reserva ───────── */
.rcard{padding:22px 24px;display:flex;flex-direction:column;gap:14px;animation:fadeSlideUp .4s both;cursor:pointer;}
.rcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.rcard-salon{font-weight:700;font-size:15.5px;letter-spacing:-.01em;}
.rcard-type{font-size:13px;color:var(--muted-fg);margin-top:2px;}
.rmeta{display:flex;flex-wrap:wrap;gap:18px;font-size:13.5px;color:var(--muted-fg);}
.rmeta span{display:inline-flex;align-items:center;gap:6px;}
.rcard-bottom{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.client{display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:600;}
.client .av{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-size:13px;font-weight:700;color:#fff;}
.price{font-size:17px;font-weight:800;letter-spacing:-.01em;}
.racts{display:flex;gap:10px;}
.rnote{border-top:1px solid var(--border);padding-top:13px;font-size:13.5px;color:var(--muted-fg);display:flex;gap:8px;line-height:1.55;}
.rlist{display:flex;flex-direction:column;gap:14px;}

/* ───────── Salón row ───────── */
.salon-row{padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;}
.salon-thumb{width:64px;height:64px;border-radius:12px;flex-shrink:0;display:grid;place-items:center;color:#fff;font-family:'Instrument Serif',serif;font-style:italic;font-size:24px;overflow:hidden;}
.salon-info{flex:1;min-width:0;}
.salon-name{font-weight:700;font-size:15.5px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.salon-loc{font-size:13px;color:var(--muted-fg);display:flex;align-items:center;gap:5px;margin-top:4px;}
.salon-right{display:flex;align-items:center;gap:14px;}
.salon-sub{border-top:1px solid var(--border);padding:6px 20px 14px;display:none;}
.salon-sub.open{display:block;animation:fadeSlideUp .3s both;}
.subrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 4px;border-bottom:1px dashed var(--border);font-size:13.5px;}
.subrow:last-child{border-bottom:none;}
.chev{transition:transform .25s;color:var(--muted-fg);}
.chev.rot{transform:rotate(90deg);}

/* ───────── Filtros ───────── */
.fbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:24px;}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{border:1px solid var(--border);background:var(--card);color:var(--muted-fg);border-radius:99px;font-size:13px;font-weight:600;padding:7px 15px;transition:all .18s;}
.chip:hover{color:var(--fg);}
.chip.on{background:var(--ink);color:var(--bone);border-color:var(--ink);}
[data-theme="dark"] .chip.on{background:var(--bone);color:var(--ink);border-color:var(--bone);}
.chip .n{opacity:.65;margin-left:5px;font-weight:700;}
.fctrl{display:flex;gap:10px;flex:1;justify-content:flex-end;flex-wrap:wrap;}
.select,.search{border:1px solid var(--border);background:var(--card);color:var(--fg);border-radius:8px;font-size:13.5px;padding:9px 12px;outline:none;}
.search{min-width:200px;}
.select:focus,.search:focus,textarea:focus{border-color:var(--coral);box-shadow:0 0 0 3px rgba(232,69,42,.12);}

/* ───────── Skeleton ───────── */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skel{border-radius:8px;background:linear-gradient(90deg,var(--muted) 25%,color-mix(in srgb,var(--muted) 50%,var(--card)) 37%,var(--muted) 63%);background-size:800px 100%;animation:shimmer 1.3s infinite linear;}
.skel-card{padding:22px 24px;display:flex;flex-direction:column;gap:14px;}

/* ───────── Estado vacío ───────── */
.empty{padding:64px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;}
.empty .eico{width:72px;height:72px;border-radius:50%;background:var(--surface-warm);display:grid;place-items:center;color:var(--muted-fg);margin-bottom:10px;}
.empty h3{margin:0;font-size:17px;font-weight:700;}
.empty p{margin:0 0 18px;color:var(--muted-fg);font-size:14px;max-width:380px;line-height:1.55;}

/* ───────── Drawer ───────── */
.overlay{position:fixed;inset:0;background:rgba(28,43,58,.45);backdrop-filter:blur(2px);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.show{opacity:1;pointer-events:auto;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:480px;max-width:100vw;background:var(--card);z-index:210;box-shadow:var(--shadow-lg);transform:translateX(105%);transition:transform .32s cubic-bezier(.32,.72,.25,1);display:flex;flex-direction:column;}
.drawer.show{transform:translateX(0);}
.drawer-body{flex:1;overflow-y:auto;padding:26px 28px;}
.drawer-foot{border-top:1px solid var(--border);padding:16px 28px;display:flex;gap:12px;background:var(--card);}
.drawer-foot .btn{flex:1;padding:12px;}
.dsec{margin-bottom:26px;}
.dlabel{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-fg);margin-bottom:10px;}
.ficha{background:var(--surface-warm);border-radius:14px;padding:18px 20px;display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;}
.ficha .f{display:flex;flex-direction:column;gap:3px;}
.ficha .fk{font-size:11.5px;font-weight:600;color:var(--muted-fg);display:flex;align-items:center;gap:5px;}
.ficha .fv{font-size:14px;font-weight:700;}
.brk{display:flex;flex-direction:column;gap:9px;font-size:14px;}
.brk div{display:flex;justify-content:space-between;color:var(--muted-fg);}
.brk .tot{border-top:1px solid var(--border);padding-top:10px;color:var(--fg);font-weight:800;font-size:16px;}
.msg{background:var(--muted);border-radius:14px;border-top-left-radius:4px;padding:14px 16px;font-size:13.5px;line-height:1.6;color:var(--fg);}
.msg-meta{font-size:11.5px;color:var(--muted-fg);margin-top:8px;}
.avail{display:flex;gap:5px;margin-top:12px;}
.avail .d{flex:1;text-align:center;font-size:11px;padding:7px 0;border-radius:8px;background:var(--muted);color:var(--muted-fg);font-weight:600;}
.avail .d.busy{background:var(--amber-light);color:var(--amber-dark);}
.avail .d.sel{background:var(--coral);color:#fff;}
.avail .d.conf{background:var(--green-light);color:var(--green);}

/* ───────── Modal ───────── */
.modal{position:fixed;inset:0;z-index:300;display:grid;place-items:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal.show{opacity:1;pointer-events:auto;}
.modal-bg{position:absolute;inset:0;background:rgba(28,43,58,.5);backdrop-filter:blur(3px);}
.modal-box{position:relative;background:var(--card);border-radius:20px;box-shadow:var(--shadow-lg);width:100%;max-width:440px;padding:28px;transform:translateY(14px) scale(.98);transition:transform .25s;}
.modal.show .modal-box{transform:none;}
.modal-box h3{margin:0 0 6px;font-size:19px;font-weight:700;letter-spacing:-.015em;}
.modal-box .msub{color:var(--muted-fg);font-size:13.5px;margin:0 0 18px;line-height:1.5;}
.modal-resume{background:var(--surface-warm);border-radius:12px;padding:14px 16px;font-size:13.5px;display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
.modal-resume b{font-weight:700;}
.modal textarea{width:100%;border:1px solid var(--border);background:var(--card);color:var(--fg);border-radius:8px;padding:11px 13px;font-size:13.5px;resize:vertical;min-height:84px;outline:none;}
.modal-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}

/* ───────── Toast ───────── */
.toasts{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:10px;align-items:center;}
.toast{background:var(--ink);color:#FAF8F5;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);animation:fadeSlideUp .3s both;}
[data-theme="dark"] .toast{background:#FAF8F5;color:#1C2B3A;}

/* ───────── Calendario ───────── */
.cal{padding:24px;}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.cal-head h3{margin:0;font-size:17px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-dow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-fg);text-align:center;padding:6px 0;}
.cal-cell{min-height:86px;border:1px solid var(--border);border-radius:10px;padding:7px 8px;font-size:12px;display:flex;flex-direction:column;gap:4px;background:var(--card);}
.cal-cell.off{opacity:.35;background:transparent;}
.cal-cell .dnum{font-weight:700;font-size:12.5px;}
.cal-cell.today .dnum{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:50%;background:var(--coral);color:#fff;}
.cal-ev{border-radius:6px;padding:3px 7px;font-size:10.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.cal-ev.conf{background:var(--green-light);color:var(--green);}
.cal-ev.pend{background:var(--amber-light);color:var(--amber-dark);}
[data-theme="dark"] .cal-ev.conf{color:#6ECB9B;}
.cal-legend{display:flex;gap:18px;margin-top:16px;font-size:12.5px;color:var(--muted-fg);}
.cal-legend span{display:inline-flex;align-items:center;gap:7px;}
.cal-legend i{width:10px;height:10px;border-radius:3px;display:inline-block;}

/* ───────── Animaciones / responsive ───────── */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.view{display:none;}
.view.on{display:block;animation:fadeSlideUp .35s both;}

@media(max-width:860px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .hdr-nav{display:none;}
}
@media(max-width:620px){
  .wrap{padding:28px 16px 70px;}
  .page-title{font-size:27px;}
  .racts{width:100%;} .racts .btn{flex:1;}
  .fctrl{justify-content:stretch;} .fctrl>*{flex:1;}
  .drawer{width:100vw;}
  .stats{grid-template-columns:1fr 1fr;gap:10px;}
  .stat .num{font-size:24px;}
  .cal-cell{min-height:60px;}
  .cal-ev{font-size:9px;padding:2px 4px;}
}
</style>
</head>
<body>

<!-- ═════════ HEADER GLOBAL ═════════ -->
<header class="hdr">
  <div class="hdr-in">
    <a class="logo" href="#">
      <svg width="28" height="28" viewBox="0 0 120 120" fill="currentColor" aria-hidden>
        <rect x="18" y="18" width="20" height="84" rx="3"/><rect x="82" y="18" width="20" height="84" rx="3"/>
        <path d="M18 62 a42 42 0 0 1 84 0 v14 h-20 v-14 a22 22 0 0 0 -44 0 v14 h-20 z"/><circle cx="60" cy="58" r="6"/>
      </svg>
      <span>hosty</span>
    </a>
    <nav class="hdr-nav">
      <a href="#">Inicio</a>
      <a href="#">Salones</a>
      <a href="#">Mis Reservas</a>
      <a href="#" class="active">Panel de host</a>
    </nav>
    <div class="hdr-actions">
      <button class="icon-btn" id="themeBtn" aria-label="Cambiar tema"></button>
      <div class="avatar">M</div>
    </div>
  </div>
</header>

<div class="wrap">
  <!-- ═════════ NAV SECUNDARIA ═════════ -->
  <nav class="subnav" id="subnav">
    <button data-view="resumen" class="on">Resumen</button>
    <button data-view="reservas">Reservas <span class="cnt" id="navPend"></span></button>
    <button data-view="salones">Mis salones</button>
    <button data-view="calendario">Calendario</button>
  </nav>

  <main>
    <section class="view on" id="view-resumen"></section>
    <section class="view" id="view-reservas"></section>
    <section class="view" id="view-salones"></section>
    <section class="view" id="view-calendario"></section>
  </main>
</div>

/* ───────────────── HELPERS ───────────────── */
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const fmtFecha = iso => { const [y,m,d]=iso.split('-').map(Number); return `${d} de ${MESES[m-1]} de ${y}`; };
const fmtFechaCorta = iso => { const [,m,d]=iso.split('-').map(Number); return `${d} ${MESES[m-1].slice(0,3)}`; };
const fmtPrecio = n => '$ ' + n.toLocaleString('es-AR');
const salonDe = r => SALONES.find(s=>s.id===r.salonId);
const ESTADOS = {pendiente:'Pendiente', confirmada:'Confirmada', rechazada:'Rechazada', cancelada:'Cancelada'};
const pill = e => `<span class="pill pill-${e}">${ESTADOS[e]}</span>`;
const ini = n => n.split(' ').map(p=>p[0]).slice(0,2).join('');
const esc = s => s.replace(/"/g,'&quot;');

/* ───────────────── ESTADO UI ───────────────── */
let state = { view:'resumen', filtro:'todas', salonF:'todos', q:'', loading:false, expandido:null, salonesVacio:false };

/* ───────────────── RENDER: card de reserva ───────────────── */
function rcard(r, compact=false){
  const s = salonDe(r);
  const acts = r.estado==='pendiente' ? `
    <div class="racts" onclick="event.stopPropagation()">
      <button class="btn btn-danger btn-sm" onclick="openModal('rechazar','${r.id}')">${ic('xCircle',15)} Rechazar</button>
      <button class="btn btn-primary btn-sm" onclick="openModal('confirmar','${r.id}')">${ic('checkCircle',15)} Confirmar</button>
    </div>` : '';
  return `
  <article class="card hoverable rcard" onclick="openDrawer('${r.id}')">
    <div class="rcard-top">
      <div>
        <div class="rcard-salon">${s.nombre}</div>
        <div class="rcard-type">${r.tipo}</div>
      </div>
      ${pill(r.estado)}
    </div>
    <div class="rmeta">
      <span>${ic('calendar',15)} ${fmtFecha(r.fecha)}</span>
      <span>${ic('clock',15)} ${r.inicio} – ${r.fin} hs</span>
      <span>${ic('users',15)} ${r.personas} personas</span>
    </div>
    <div class="rcard-bottom">
      <div class="client">
        <span class="av" style="background:${r.cliente.color}">${ini(r.cliente.nombre)}</span>
        ${r.cliente.nombre}
      </div>
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <span class="price">${fmtPrecio(r.precio)}</span>
        ${acts}
      </div>
    </div>
    ${!compact && r.nota ? `<div class="rnote"><span style="color:var(--muted-fg);margin-top:1px">${ic('message',15)}</span><span>“${r.nota}”</span></div>`:''}
  </article>`;
}

function salonRow(s){
  const pend = RESERVAS.filter(r=>r.salonId===s.id && r.estado==='pendiente').length;
  const sus = RESERVAS.filter(r=>r.salonId===s.id);
  const open = state.expandido===s.id;
  return `
  <div class="card hoverable">
    <div class="salon-row" onclick="toggleSalon('${s.id}')">
      <div class="salon-thumb" style="background:${s.grad}">${s.ini}</div>
      <div class="salon-info">
        <div class="salon-name">${s.nombre} ${s.badge?hbadge(s.badge):''}</div>
        <div class="salon-loc">${ic('mapPin',13)} ${s.ubicacion} · hasta ${s.cap} personas</div>
      </div>
      <div class="salon-right">
        ${pend?`<span class="pill pill-coral">${pend} pendiente${pend>1?'s':''}</span>`:''}
        <span class="chev ${open?'rot':''}">${ic('chevronRight',18)}</span>
      </div>
    </div>
    <div class="salon-sub ${open?'open':''}">
      ${sus.length ? sus.map(r=>`
        <div class="subrow">
          <span style="display:flex;align-items:center;gap:9px;min-width:0">
            ${pill(r.estado)}

          </span>
          <button class="sec-link" onclick="openDrawer('${r.id}')">Ver ${ic('chevronRight',13)}</button>
        </div>`).join('') : `<p style="color:var(--muted-fg);font-size:13px;padding:10px 4px">Sin reservas todavía.</p>`}
    </div>
  </div>`;
}

/* ───────────────── VISTA: RESERVAS ───────────────── */
function renderReservas(){
  const counts = {todas:RESERVAS.length};
  Object.keys(ESTADOS).forEach(e=>counts[e]=RESERVAS.filter(r=>r.estado===e).length);

  let list = RESERVAS.slice().sort((a,b)=>a.fecha.localeCompare(b.fecha));
  if(state.filtro!=='todas') list = list.filter(r=>r.estado===state.filtro);
  if(state.salonF!=='todos') list = list.filter(r=>r.salonId===state.salonF);
  if(state.q) list = list.filter(r=>r.cliente.nombre.toLowerCase().includes(state.q.toLowerCase()));

  const chips = ['todas',...Object.keys(ESTADOS)].map(f=>
    `<button class="chip ${state.filtro===f?'on':''}" onclick="setFiltro('${f}')">${f==='todas'?'Todas':ESTADOS[f]+'s'.replace('as','as')}<span class="n">${counts[f]}</span></button>`
  ).join('');

  const body = state.loading
    ? Array(3).fill(`
      <div class="card skel-card">
        <div style="display:flex;justify-content:space-between"><div class="skel" style="width:200px;height:18px"></div><div class="skel" style="width:80px;height:22px;border-radius:99px"></div></div>
        <div class="skel" style="width:65%;height:14px"></div>
        <div style="display:flex;justify-content:space-between"><div class="skel" style="width:140px;height:30px;border-radius:99px"></div><div class="skel" style="width:110px;height:20px"></div></div>
      </div>`).join('')
    : (list.length ? list.map(r=>rcard(r)).join('') : `
      <div class="card empty">
        <div class="eico">${ic('filter',28)}</div>
        <h3>No encontramos reservas</h3>
        <p>Probá ajustando los filtros o la búsqueda.</p>
        <button class="btn btn-outline btn-sm" onclick="setFiltro('todas')">Limpiar filtros</button>
      </div>`);

  document.getElementById('view-reservas').innerHTML = `
  <div class="page-head">
    <div>
      <h1 class="page-title">Reservas<span class="dot">●</span></h1>
      <p class="page-sub">Revisá y respondé las solicitudes de tus salones.</p>
    </div>
  </div>
  <div class="fbar">
    <div class="chips">${chips}</div>
    <div class="fctrl">
      <select class="select" onchange="setSalonF(this.value)">
        <option value="todos" ${state.salonF==='todos'?'selected':''}>Todos los salones</option>
        ${SALONES.map(s=>`<option value="${s.id}" ${state.salonF===s.id?'selected':''}>${s.nombre}</option>`).join('')}
      </select>
      <input class="search" type="search" placeholder="Buscar por cliente…" value="${esc(state.q)}"
        oninput="state.q=this.value;debounceRender()">
    </div>
  </div>
  <div class="rlist">${body}</div>`;
}

    <button class="btn btn-primary" onclick="state.salonesVacio=false;renderSalones();toast('Salón de ejemplo restaurado')">${ic('plus',16)} Publicar mi salón</button>
  </div>` : `
  <div class="rlist">${SALONES.map(s=>salonRow(s)).join('')}</div>`}`;
}

/* ───────────────── VISTA: CALENDARIO ───────────────── */
function renderCalendario(){
  const Y=2026, M=5; // junio 2026
  const first = new Date(Y,M,1);
  const offset = (first.getDay()+6)%7; // lunes=0
  const days = new Date(Y,M+1,0).getDate();
  const evs = {};
  RESERVAS.filter(r=>['confirmada','pendiente'].includes(r.estado) && r.fecha.startsWith('2026-06'))
    .forEach(r=>{ const d=+r.fecha.split('-')[2]; (evs[d]=evs[d]||[]).push(r); });

  let cells='';
  for(let i=0;i<offset;i++) cells+=`<div class="cal-cell off"></div>`;
  for(let d=1;d<=days;d++){
    const today = d===9;
    cells+=`<div class="cal-cell ${today?'today':''}">
      <span class="dnum">${d}</span>
      ${(evs[d]||[]).map(r=>`<span class="cal-ev ${r.estado==='confirmada'?'conf':'pend'}" onclick="openDrawer('${r.id}')" title="${esc(r.tipo)} · ${esc(salonDe(r).nombre)}">${r.inicio} ${r.tipo}</span>`).join('')}
    </div>`;
  }
  document.getElementById('view-calendario').innerHTML = `
  <div class="page-head">
    <div>
      <h1 class="page-title">Calendario<span class="dot">●</span></h1>
      <p class="page-sub">Tu ocupación de un vistazo, en todos tus salones.</p>
    </div>
  </div>
  <div class="card cal">
    <div class="cal-head">
      <button class="icon-btn" aria-label="Mes anterior">${ic('chevronLeft',18)}</button>
      <h3>Junio <span style="font-family:'Instrument Serif',serif;font-style:italic;font-weight:400">2026</span></h3>
      <button class="icon-btn" aria-label="Mes siguiente">${ic('chevronRight',18)}</button>
    </div>
    <div class="cal-grid">
      ${['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>
    <div class="cal-legend">
      <span><i style="background:var(--green-light);border:1px solid var(--green)"></i> Confirmado</span>
      <span><i style="background:var(--amber-light);border:1px solid var(--amber)"></i> Pendiente</span>
      <span><i style="background:var(--coral)"></i> Hoy</span>
    </div>
  </div>`;
}

/* ───────────────── DRAWER DETALLE ───────────────── */
function openDrawer(id){
  const r = RESERVAS.find(x=>x.id===id); if(!r) return;
  const s = salonDe(r);
  const d = +r.fecha.split('-')[2];
  const week = [];
  for(let i=-3;i<=3;i++){
    const dd=d+i; if(dd<1||dd>30) {week.push(null);continue;}
    const other = RESERVAS.find(x=>x.salonId===s.id && +x.fecha.split('-')[2]===dd && x.id!==r.id && ['confirmada','pendiente'].includes(x.estado));
    week.push({d:dd, cls: i===0?'sel':(other?(other.estado==='confirmada'?'conf':'busy'):'')});
  }
  const resuelta = r.estado!=='pendiente';
  document.getElementById('drawer').innerHTML = `
  <div class="drawer-body">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
      ${pill(r.estado)}
      <button class="icon-btn" onclick="closeDrawer()" aria-label="Cerrar">${ic('x',18)}</button>
    </div>

    <div style="display:flex;gap:14px;align-items:center;margin-bottom:26px">
      <div class="salon-thumb" style="background:${s.grad};width:56px;height:56px;font-size:21px">${s.ini}</div>
      <div>
        <div style="font-weight:800;font-size:18px;letter-spacing:-.02em">${s.nombre}</div>
        <div style="font-size:13px;color:var(--muted-fg);display:flex;align-items:center;gap:5px;margin-top:3px">${ic('mapPin',13)} ${s.ubicacion}</div>
      </div>
    </div>

    <div class="dsec">
      <div class="dlabel">Cliente</div>
      <div class="card" style="padding:14px 16px;display:flex;align-items:center;gap:12px;border-radius:14px;box-shadow:none">
        <span class="av client" style="width:40px;height:40px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;background:${r.cliente.color}">${ini(r.cliente.nombre)}</span>
        <div style="flex:1">
          <div style="font-weight:700;font-size:14.5px">${r.cliente.nombre}</div>
          <div style="font-size:12.5px;color:var(--muted-fg);display:flex;gap:14px;margin-top:3px;flex-wrap:wrap">
            <span style="display:inline-flex;gap:5px;align-items:center">${ic('phone',12)} ${r.cliente.tel}</span>
            <span style="display:inline-flex;gap:5px;align-items:center">${ic('mail',12)} ${r.cliente.mail}</span>
          </div>
        </div>
        <button class="icon-btn" title="Ver perfil">${ic('externalLink',16)}</button>
      </div>
    </div>

    <div class="dsec">
      <div class="dlabel">El evento</div>
      <div class="ficha">
        <div class="f"><span class="fk">${ic('calendar',12)} Fecha</span><span class="fv">${fmtFecha(r.fecha)}</span></div>
        <div class="f"><span class="fk">${ic('clock',12)} Horario</span><span class="fv">${r.inicio} – ${r.fin} hs</span></div>
        <div class="f"><span class="fk">${ic('users',12)} Invitados</span><span class="fv">${r.personas} personas</span></div>
        <div class="f"><span class="fk">${ic('message',12)} Tipo</span><span class="fv">${r.tipo}</span></div>
      </div>
      <div class="avail">
        ${week.map(w=>w?`<span class="d ${w.cls}">${w.d}</span>`:`<span class="d" style="opacity:.25">·</span>`).join('')}
      </div>
      <div style="font-size:11.5px;color:var(--muted-fg);margin-top:8px">Disponibilidad de ${s.nombre} esa semana · coral = esta solicitud</div>
    </div>

    <div class="dsec">
      <div class="dlabel">Precio</div>
      <div class="brk">
        <div><span>Alquiler base</span><span>${fmtPrecio(r.base)}</span></div>
        ${r.extras.map(e=>`<div><span>${e.k}</span><span>${fmtPrecio(e.v)}</span></div>`).join('')}
        <div class="tot"><span>Total</span><span>${fmtPrecio(r.precio)}</span></div>
      </div>
    </div>

    ${r.nota?`
    <div class="dsec">
      <div class="dlabel">Mensaje del cliente</div>
      <div class="msg">${r.nota}
        <div class="msg-meta">Solicitud enviada el ${fmtFecha(r.creada.slice(0,10))}</div>
      </div>
    </div>`:''}

    ${r.estado==='rechazada'&&r.motivo?`
    <div class="dsec">
      <div class="dlabel">Motivo del rechazo</div>
      <div class="msg" style="background:var(--red-soft);color:var(--red-text)">${r.motivo}</div>
    </div>`:''}
  </div>

  <div class="drawer-foot">
    ${resuelta ? `
      <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:9px;font-size:13.5px;color:var(--muted-fg)">
        ${pill(r.estado)} ${r.respondida?`Respondida el ${fmtFecha(r.respondida.slice(0,10))}`:''}
      </div>` : `
      <button class="btn btn-danger" onclick="openModal('rechazar','${r.id}')">${ic('xCircle',16)} Rechazar</button>
      <button class="btn btn-primary" onclick="openModal('confirmar','${r.id}')">${ic('checkCircle',16)} Confirmar</button>`}
  </div>`;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('drawer').classList.add('show');
}
function closeDrawer(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('drawer').classList.remove('show');
}
document.getElementById('overlay').addEventListener('click',closeDrawer);

/* ───────────────── MODALES ───────────────── */
function openModal(tipo,id){
  const r = RESERVAS.find(x=>x.id===id); const s = salonDe(r);
  const conf = tipo==='confirmar';
  document.getElementById('modal').innerHTML = `
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal-box">
    <h3>${conf?'Confirmar reserva':'Rechazar reserva'}</h3>
    <p class="msub">${conf
      ?'El cliente va a recibir la confirmación y los datos de contacto del salón.'
      :'Contanos el motivo (opcional). El cliente va a recibir la notificación.'}</p>
    <div class="modal-resume">
      <span><b>${r.tipo}</b> · ${s.nombre}</span>
      <span style="color:var(--muted-fg)">${fmtFecha(r.fecha)} · ${r.inicio}–${r.fin} hs · ${r.personas} personas</span>
      <span><b>${fmtPrecio(r.precio)}</b></span>
    </div>
    <textarea id="modalMsg" placeholder="${conf?'Mensaje opcional para el cliente…':'Motivo del rechazo (opcional)…'}"></textarea>
    <div class="modal-acts">
      <button class="btn btn-outline" onclick="closeModal()">Volver</button>
      ${conf
        ?`<button class="btn btn-primary" onclick="resolver('${r.id}','confirmada')">${ic('checkCircle',16)} Confirmar reserva</button>`
        :`<button class="btn btn-primary" style="background:var(--coral)" onclick="resolver('${r.id}','rechazada')">${ic('xCircle',16)} Rechazar</button>`}
    </div>
  </div>`;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function resolver(id,estado){
  const r = RESERVAS.find(x=>x.id===id);
  r.estado = estado;
  r.respondida = '2026-06-09T12:00:00';
  const msg = document.getElementById('modalMsg').value.trim();
  if(estado==='rechazada' && msg) r.motivo = msg;
  closeModal(); closeDrawer();
  toast(estado==='confirmada'?'Reserva confirmada ✓':'Reserva rechazada');
  renderAll();
}

/* ───────────────── TOAST ───────────────── */
function toast(txt){
  const t=document.createElement('div'); t.className='toast';
  t.innerHTML = `${ic('check',15)} ${txt}`;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';},2600);
  setTimeout(()=>t.remove(),3100);
}

/* ───────────────── NAVEGACIÓN / FILTROS ───────────────── */
function goView(v, filtro){
  state.view=v;
  if(filtro){state.filtro=filtro;}
  document.querySelectorAll('#subnav button').forEach(b=>b.classList.toggle('on',b.dataset.view===v));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  document.getElementById('view-'+v).classList.add('on');
  renderAll();
  window.scrollTo({top:0,behavior:'smooth'});
}
document.querySelectorAll('#subnav button').forEach(b=>b.addEventListener('click',()=>goView(b.dataset.view)));

function setFiltro(f){
  state.filtro=f; state.loading=true; renderReservas();
  setTimeout(()=>{state.loading=false; renderReservas();},550);
}
function setSalonF(v){ state.salonF=v; renderReservas(); }
let debT; function debounceRender(){ clearTimeout(debT); debT=setTimeout(()=>{renderReservas(); const inp=document.querySelector('.search'); if(inp){inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length);}},250); }
function toggleSalon(id){ state.expandido = state.expandido===id?null:id; renderAll(); }

/* ───────────────── TEMA ───────────────── */
const themeBtn = document.getElementById('themeBtn');
function setTheme(t){
  document.documentElement.dataset.theme=t;
  themeBtn.innerHTML = t==='light'?ic('moon',19):ic('sun',19);
}
themeBtn.addEventListener('click',()=>setTheme(document.documentElement.dataset.theme==='light'?'dark':'light'));

/* ───────────────── INIT ───────────────── */
function renderAll(){
  const pend = RESERVAS.filter(r=>r.estado==='pendiente').length;
  const cnt = document.getElementById('navPend');
  cnt.textContent = pend; cnt.style.display = pend?'inline':'none';
  renderResumen(); renderReservas(); renderSalones(); renderCalendario();
}
setTheme('light');
renderAll();
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeModal();closeDrawer();} });
</script>
</body>
</html>
